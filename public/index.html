<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERSHELL — Web SSH Gateway</title>

  <!-- xterm.js — served locally from npm packages -->
  <link rel="stylesheet" href="/xterm/css/xterm.css">
  <script src="/xterm/lib/xterm.js"></script>
  <script src="/xterm-addon-fit/lib/addon-fit.js"></script>

  <!-- Share Tech Mono (cyberpunk mono face) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════════
       DESIGN TOKENS
       ═══════════════════════════════════════════════════ */
    :root {
      --bg:            #030303;
      --surface:       #080002;
      --surface2:      #0e0004;
      --border:        #1e0009;
      --border-mid:    #2e0012;
      --border-bright: #4a0020;

      --red:           #ff0033;
      --red-dim:       #aa0022;
      --red-dark:      #55000e;
      --red-glow:      rgba(255, 0, 51, 0.35);
      --red-glow-soft: rgba(255, 0, 51, 0.12);
      --red-glow-xs:   rgba(255, 0, 51, 0.06);

      --text:          #e2d8dc;
      --text-mid:      #9a8890;
      --text-dim:      #5a4850;
      --text-label:    #ff4466;

      --green:         #00ff88;
      --green-glow:    rgba(0, 255, 136, 0.4);
      --amber:         #ffaa00;

      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --font-display: 'Orbitron', 'Share Tech Mono', monospace;

      --radius: 2px;
      --transition: 0.18s ease;
    }

    /* ═══════════════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════════════════
       SCANLINES — signature atmospheric overlay
       ═══════════════════════════════════════════════════ */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.18) 3px,
        rgba(0, 0, 0, 0.18) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ═══════════════════════════════════════════════════
       GRID BACKGROUND
       ═══════════════════════════════════════════════════ */
    #app {
      height: 100vh;
      width: 100vw;
      position: relative;
      background-image:
        linear-gradient(rgba(255,0,51,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,0,51,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ═══════════════════════════════════════════════════
       VIEWS — connection form & terminal
       ═══════════════════════════════════════════════════ */
    .view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .view.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.98);
    }

    /* ═══════════════════════════════════════════════════
       CONNECTION SCREEN
       ═══════════════════════════════════════════════════ */
    #view-connect {
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Logo ── */
    .logo {
      text-align: center;
      margin-bottom: 36px;
      position: relative;
    }

    .logo-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: 0.2em;
      color: var(--red);
      text-shadow:
        0 0 20px var(--red-glow),
        0 0 40px var(--red-glow-soft),
        0 0 80px var(--red-glow-xs);
      position: relative;
      display: inline-block;
      /* Glitch — the signature animation */
      animation: glitch-base 8s infinite;
    }

    /* Chromatic aberration layers */
    .logo-title::before,
    .logo-title::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%;
    }
    .logo-title::before {
      color: #00ffee;
      animation: glitch-top 8s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    }
    .logo-title::after {
      color: #ff00aa;
      animation: glitch-bottom 8s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
    }

    .logo-sub {
      display: block;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.35em;
      color: var(--text-mid);
      margin-top: 8px;
      text-transform: uppercase;
    }

    .logo-sub span {
      color: var(--red-dim);
    }

    @keyframes glitch-base {
      0%, 88%, 100% { transform: none; }
      90%  { transform: skewX(-1deg) translateX(1px); }
      91%  { transform: skewX(1deg)  translateX(-1px); }
      92%  { transform: none; }
      94%  { transform: skewX(-0.5deg); }
      95%  { transform: none; }
    }

    @keyframes glitch-top {
      0%, 88%, 100% { transform: none; opacity: 0; }
      89%  { opacity: 0.7; transform: translateX(-3px); }
      90%  { opacity: 0.5; transform: translateX(3px); }
      91%  { opacity: 0; }
      93%  { opacity: 0.4; transform: translateX(-2px); }
      94%  { opacity: 0; }
    }

    @keyframes glitch-bottom {
      0%, 88%, 100% { transform: none; opacity: 0; }
      89%  { opacity: 0.6; transform: translateX(3px); }
      90%  { opacity: 0.4; transform: translateX(-2px); }
      91%  { opacity: 0; }
      93%  { opacity: 0.5; transform: translateX(2px); }
      94%  { opacity: 0; }
    }

    /* ── Panel ── */
    .panel {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      position: relative;
      padding: 32px 28px 28px;
    }

    /* CRT corner brackets */
    .panel::before,
    .panel::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: var(--red);
      border-style: solid;
    }
    .panel::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }
    .panel::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    /* Corner brackets — bottom-left & top-right via wrapper */
    .panel-inner::before,
    .panel-inner::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: var(--red);
      border-style: solid;
    }
    .panel-inner::before {
      bottom: -1px; left: -1px;
      border-width: 0 0 2px 2px;
    }
    .panel-inner::after {
      top: -1px; right: -1px;
      border-width: 2px 2px 0 0;
    }

    .panel-inner {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* ── Form Fields ── */
    .field-group {
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--text-label);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field-row {
      display: flex;
      gap: 10px;
    }

    .field-row .field-group:first-child { flex: 1; }
    .field-row .field-group:last-child  { flex: 0 0 80px; }

    input[type="text"],
    input[type="password"],
    input[type="number"] {
      width: 100%;
      background: #050001;
      border: 1px solid var(--border-bright);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      border-radius: var(--radius);
      transition: border-color var(--transition), box-shadow var(--transition);
      -webkit-appearance: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="number"]:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 1px var(--red-dark), 0 0 12px var(--red-glow-soft);
    }

    input::placeholder { color: var(--text-dim); }

    input[type="number"] { text-align: center; }
    /* Remove number spinners */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"] { -moz-appearance: textfield; }

    /* ── Password toggle ── */
    .password-wrap {
      position: relative;
    }
    .password-wrap input { padding-right: 40px; }
    .pw-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 15px;
      padding: 4px;
      line-height: 1;
      transition: color var(--transition);
    }
    .pw-toggle:hover { color: var(--red); }

    /* ── Connect button ── */
    #btn-connect {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.25em;
      cursor: pointer;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: color var(--transition), background var(--transition), box-shadow var(--transition);
      margin-top: 8px;
    }

    #btn-connect::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--red);
      transform: translateX(-105%);
      transition: transform 0.25s ease;
      z-index: 0;
    }
    #btn-connect:hover::before { transform: translateX(0); }
    #btn-connect:hover {
      color: #050001;
      box-shadow: 0 0 20px var(--red-glow);
    }
    #btn-connect span { position: relative; z-index: 1; }
    #btn-connect:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-connect:disabled::before { display: none; }

    /* ── Status / Error ── */
    #connect-status {
      margin-top: 16px;
      padding: 10px 12px;
      font-size: 12px;
      letter-spacing: 0.05em;
      border-left: 2px solid transparent;
      display: none;
    }
    #connect-status.show { display: block; }
    #connect-status.status-connecting {
      border-color: var(--amber);
      color: var(--amber);
      background: rgba(255, 170, 0, 0.05);
    }
    #connect-status.status-error {
      border-color: var(--red);
      color: #ff4466;
      background: var(--red-glow-xs);
    }

    /* Connecting dots animation */
    .dot-anim::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    /* ─── Footer note ─── */
    .panel-footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.05em;
    }
    .panel-footer a {
      color: var(--red-dim);
      text-decoration: none;
    }
    .panel-footer a:hover { color: var(--red); }

    /* ═══════════════════════════════════════════════════
       TERMINAL SCREEN
       ═══════════════════════════════════════════════════ */
    #view-terminal {
      display: flex;
      flex-direction: column;
    }

    /* ── Terminal header bar ── */
    #term-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px;
      height: 44px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-mid);
      position: relative;
      z-index: 10;
    }

    .term-logo {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--red);
      text-shadow: 0 0 12px var(--red-glow);
      white-space: nowrap;
    }

    .term-divider {
      width: 1px;
      height: 20px;
      background: var(--border-mid);
      flex-shrink: 0;
    }

    /* Status dot */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
      flex-shrink: 0;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 6px var(--green-glow); }
      50%       { box-shadow: 0 0 14px var(--green-glow), 0 0 24px rgba(0,255,136,0.2); }
    }

    .session-info {
      font-size: 12px;
      color: var(--text-mid);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }
    .session-info strong { color: var(--text); }

    #btn-disconnect {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--red-dark);
      color: var(--red-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      padding: 5px 14px;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color var(--transition), color var(--transition), box-shadow var(--transition);
    }
    #btn-disconnect:hover {
      border-color: var(--red);
      color: var(--red);
      box-shadow: 0 0 10px var(--red-glow-soft);
    }

    /* ── xterm wrapper ── */
    #terminal-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      padding: 8px;
      background: #030000;
      border: 1px solid var(--border);
      border-top: none;
      margin: 0 6px 6px;
      box-shadow:
        inset 0 0 30px rgba(0, 0, 0, 0.6),
        0 0 20px var(--red-glow-soft);
      animation: term-glow 3s ease-in-out infinite;
    }
    @keyframes term-glow {
      0%, 100% { box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 0 0 15px var(--red-glow-soft); }
      50%       { box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 0 0 30px var(--red-glow-soft), 0 0 50px var(--red-glow-xs); }
    }

    /* Corner brackets on terminal too */
    #terminal-wrap::before, #terminal-wrap::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--red-dim);
      border-style: solid;
      z-index: 5;
      pointer-events: none;
    }
    #terminal-wrap::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
    #terminal-wrap::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    #terminal {
      width: 100%;
      height: 100%;
    }

    /* xterm overrides — make scrollbar match theme */
    .xterm-viewport::-webkit-scrollbar { width: 6px; }
    .xterm-viewport::-webkit-scrollbar-track { background: var(--surface); }
    .xterm-viewport::-webkit-scrollbar-thumb {
      background: var(--red-dark);
      border-radius: 3px;
    }
    .xterm-viewport::-webkit-scrollbar-thumb:hover { background: var(--red-dim); }

    /* ═══════════════════════════════════════════════════
       UTILITY
       ═══════════════════════════════════════════════════ */
    .hidden { opacity: 0 !important; pointer-events: none !important; }

    /* Subtle flicker on the whole app — very subtle, 0.3% opacity drop */
    @keyframes crt-flicker {
      0%, 97%, 100% { opacity: 1; }
      98%            { opacity: 0.97; }
    }
    #app { animation: crt-flicker 6s infinite; }

    /* ═══════════════════════════════════════════════════
       REDUCED MOTION
       ═══════════════════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════════
       VIEW 1 — Connection Form
       ══════════════════════════════════════ -->
  <div id="view-connect" class="view">
    <div class="logo">
      <span class="logo-title" data-text="CYBERSHELL">CYBERSHELL</span>
      <small class="logo-sub">
        <span>///</span> WEB SSH GATEWAY <span>///</span>
      </small>
    </div>

    <div class="panel">
      <div class="panel-inner"></div>

      <!-- Target + Port -->
      <div class="field-row">
        <div class="field-group">
          <label class="field-label" for="inp-target">Target</label>
          <input
            id="inp-target"
            type="text"
            placeholder="root@192.168.1.12"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
          >
        </div>
        <div class="field-group">
          <label class="field-label" for="inp-port">Port</label>
          <input
            id="inp-port"
            type="number"
            value="22"
            min="1"
            max="65535"
            autocomplete="off"
          >
        </div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label class="field-label" for="inp-password">Password</label>
        <div class="password-wrap">
          <input
            id="inp-password"
            type="password"
            placeholder="••••••••••••"
            autocomplete="current-password"
          >
          <button class="pw-toggle" id="pw-toggle" type="button" title="Show/hide password">
            👁
          </button>
        </div>
      </div>

      <button id="btn-connect" type="button">
        <span>&#9654;&nbsp; ESTABLISH CONNECTION</span>
      </button>

      <div id="connect-status"></div>

      <div class="panel-footer">
        Encrypted via TLS &bull; Credentials never stored &bull;
        <a href="#" onclick="showHelp(); return false;">?&nbsp;Help</a>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       VIEW 2 — Terminal
       ══════════════════════════════════════ -->
  <div id="view-terminal" class="view hidden">
    <div id="term-header">
      <span class="term-logo">CYBERSHELL</span>
      <div class="term-divider"></div>
      <div class="status-dot"></div>
      <div class="session-info" id="session-info">
        <strong id="session-target">—</strong>
      </div>
      <button id="btn-disconnect">✕ Disconnect</button>
    </div>
    <div id="terminal-wrap">
      <div id="terminal"></div>
    </div>
  </div>

</div><!-- #app -->

<script>
/* ═══════════════════════════════════════════════════════════
   CyberShell — Frontend Logic
   ═══════════════════════════════════════════════════════════ */
'use strict';

// ── DOM refs ────────────────────────────────────────────────
const viewConnect    = document.getElementById('view-connect');
const viewTerminal   = document.getElementById('view-terminal');
const inpTarget      = document.getElementById('inp-target');
const inpPort        = document.getElementById('inp-port');
const inpPassword    = document.getElementById('inp-password');
const btnConnect     = document.getElementById('btn-connect');
const btnDisconnect  = document.getElementById('btn-disconnect');
const connectStatus  = document.getElementById('connect-status');
const sessionTarget  = document.getElementById('session-target');
const pwToggle       = document.getElementById('pw-toggle');
const terminalEl     = document.getElementById('terminal');
const termWrap       = document.getElementById('terminal-wrap');

// ── State ────────────────────────────────────────────────────
let ws          = null;
let term        = null;
let fitAddon    = null;
let pingTimer   = null;
let resizeTimer = null;

// ── xterm setup ──────────────────────────────────────────────
function createTerminal() {
  if (term) {
    term.dispose();
    term = null;
  }

  term = new Terminal({
    cursorBlink:   true,
    cursorStyle:   'block',
    fontFamily:    "'JetBrains Mono', 'Fira Code', 'Share Tech Mono', monospace",
    fontSize:      14,
    lineHeight:    1.2,
    letterSpacing: 0,
    scrollback:    5000,
    theme: {
      background:   '#030000',
      foreground:   '#c8c0c4',
      cursor:       '#ff0033',
      cursorAccent: '#030000',
      selectionBackground: 'rgba(255, 0, 51, 0.25)',
      black:        '#1a0008',
      red:          '#ff0033',
      green:        '#00cc66',
      yellow:       '#ffaa00',
      blue:         '#3399ff',
      magenta:      '#ff0088',
      cyan:         '#00ccaa',
      white:        '#c8c0c4',
      brightBlack:  '#5a4858',
      brightRed:    '#ff4466',
      brightGreen:  '#00ff88',
      brightYellow: '#ffcc00',
      brightBlue:   '#66bbff',
      brightMagenta:'#ff44cc',
      brightCyan:   '#00ffdd',
      brightWhite:  '#f0e8ec',
    },
    allowProposedApi: true,
  });

  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(terminalEl);
  fitAddon.fit();

  // Input from browser → server
  term.onData((data) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'data', data }));
    }
  });

  // Terminal resize → server
  term.onResize(({ rows, cols }) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', rows, cols }));
    }
  });
}

// ── View switching ───────────────────────────────────────────
function showTerminal(target) {
  sessionTarget.textContent = target;
  viewConnect.classList.add('hidden');
  viewTerminal.classList.remove('hidden');
  setTimeout(() => {
    terminalEl.focus();
    if (fitAddon) fitAddon.fit();
  }, 50);
}

function showConnect(msg) {
  clearInterval(pingTimer);
  viewTerminal.classList.add('hidden');
  viewConnect.classList.remove('hidden');
  if (msg) setStatus('error', msg);
  btnConnect.disabled = false;
}

// ── Status display ───────────────────────────────────────────
function setStatus(type, msg) {
  connectStatus.className = 'show status-' + type;
  connectStatus.innerHTML = msg;
}

function clearStatus() {
  connectStatus.className = '';
  connectStatus.innerHTML = '';
}

// ── Parse user@host ──────────────────────────────────────────
function parseTarget(raw) {
  raw = raw.trim();
  const atIdx = raw.lastIndexOf('@');
  if (atIdx < 1 || atIdx === raw.length - 1) return null;
  return {
    username: raw.slice(0, atIdx).trim(),
    host:     raw.slice(atIdx + 1).trim(),
  };
}

// ── WebSocket connect ────────────────────────────────────────
function connect() {
  const target = parseTarget(inpTarget.value);
  if (!target) {
    setStatus('error', 'Enter target as <strong>user@host</strong> — e.g. root@192.168.1.12');
    return;
  }
  const password = inpPassword.value;
  if (!password) {
    setStatus('error', 'Password is required.');
    inpPassword.focus();
    return;
  }

  const port = parseInt(inpPort.value, 10) || 22;
  if (port < 1 || port > 65535) {
    setStatus('error', 'Port must be 1–65535.');
    return;
  }

  // Close any existing socket
  if (ws) {
    try { ws.close(); } catch {}
    ws = null;
  }

  btnConnect.disabled = true;
  setStatus('connecting', `<span class="dot-anim">Connecting to ${target.username}@${target.host}:${port}</span>`);

  const wsUrl = `wss://${location.host}`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    // Keep form visible while SSH handshakes — only show terminal on 'connected'
    const port = parseInt(inpPort.value, 10) || 22;
    ws.send(JSON.stringify({
      type:     'connect',
      host:     target.host,
      port,
      username: target.username,
      password,
      rows: 24,
      cols: 80,
    }));
  };

  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); }
    catch { return; }

    switch (msg.type) {
      case 'connected':
        // SSH handshake confirmed — now build and show the terminal
        createTerminal();
        showTerminal(`${target.username}@${target.host}:${parseInt(inpPort.value,10)||22}`);
        // Send real terminal dimensions now that xterm is rendered
        if (ws && ws.readyState === WebSocket.OPEN && term) {
          ws.send(JSON.stringify({ type: 'resize', rows: term.rows, cols: term.cols }));
        }
        // Keepalive ping every 25s
        pingTimer = setInterval(() => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'ping' }));
          }
        }, 25_000);
        break;

      case 'data':
        if (term) {
          const raw = atob(msg.data);
          const bytes = new Uint8Array(raw.length);
          for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
          term.write(bytes);
        }
        break;

      case 'status':
        // Server status messages (e.g. "Connecting…") — write to terminal
        if (term) term.write('\r\n\x1b[33m' + msg.message + '\x1b[0m\r\n');
        break;

      case 'error':
        // If terminal is visible, write to it; otherwise show on form
        if (!viewTerminal.classList.contains('hidden') && term) {
          term.write('\r\n\x1b[31m✗ ' + msg.message + '\x1b[0m\r\n');
          setTimeout(() => showConnect(null), 2500);
        } else {
          showConnect('SSH error: ' + msg.message);
        }
        clearInterval(pingTimer);
        btnConnect.disabled = false;
        break;

      case 'disconnected':
        if (term) term.write('\r\n\x1b[31m[Connection closed]\x1b[0m\r\n');
        clearInterval(pingTimer);
        setTimeout(() => showConnect(null), 2000);
        break;
    }
  };

  ws.onerror = () => {
    clearInterval(pingTimer);
    btnConnect.disabled = false;
    showConnect('WebSocket error — check that the server is running and the certificate is trusted.');
  };

  ws.onclose = (evt) => {
    clearInterval(pingTimer);
    if (evt.code !== 1000 && viewTerminal && !viewTerminal.classList.contains('hidden')) {
      if (term) term.write('\r\n\x1b[31m[WebSocket closed]\x1b[0m\r\n');
      setTimeout(() => showConnect(null), 2000);
    }
  };
}

// ── Disconnect ───────────────────────────────────────────────
function disconnect() {
  clearInterval(pingTimer);
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'disconnect' }));
    ws.close(1000);
  }
  ws = null;
  showConnect(null);
}

// ── Resize handling ──────────────────────────────────────────
const handleResize = () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (fitAddon) fitAddon.fit();
  }, 100);
};
window.addEventListener('resize', handleResize);

// ── Password toggle ──────────────────────────────────────────
pwToggle.addEventListener('click', () => {
  const isPassword = inpPassword.type === 'password';
  inpPassword.type = isPassword ? 'text' : 'password';
  pwToggle.textContent = isPassword ? '🚫' : '👁';
});

// ── Keyboard shortcuts ────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  // Enter in any form field → connect
  if (!viewConnect.classList.contains('hidden')) {
    if (e.key === 'Enter') {
      e.preventDefault();
      connect();
    }
  }
});

// ── Button handlers ───────────────────────────────────────────
btnConnect.addEventListener('click', connect);
btnDisconnect.addEventListener('click', disconnect);

// ── Help ─────────────────────────────────────────────────────
function showHelp() {
  alert(
    'CYBERSHELL — Quick Help\n\n' +
    '• Target format: user@host or user@ip\n' +
    '  Example: root@192.168.1.10\n\n' +
    '• Default SSH port is 22.\n\n' +
    '• If your browser shows a certificate warning, click\n' +
    '  "Advanced → Proceed" to accept the self-signed cert.\n\n' +
    '• To permanently trust the cert, import\n' +
    '  ./certs/server.cert into your OS or browser.\n\n' +
    '• Keyboard: Ctrl+C, Ctrl+D, arrow keys all work normally.'
  );
}

// ── Input hint: auto-fill port from target if user types ssh://  ──────────
inpTarget.addEventListener('input', () => {
  clearStatus();
  // If user pastes something like "ssh://root@host:2222", parse it
  const val = inpTarget.value;
  const sshMatch = val.match(/^ssh:\/\/([\w.@-]+?)(?::(\d+))?$/i);
  if (sshMatch) {
    inpTarget.value = sshMatch[1];
    if (sshMatch[2]) inpPort.value = sshMatch[2];
  }
});

// Initial focus
inpTarget.focus();
</script>
